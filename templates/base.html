<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">

        <!-- 왼쪽 로고 -->
        <span class="navbar-brand mb-0 h1">📦 Inventory System</span>

        <!-- 오른쪽 메뉴 -->
        <div class="d-flex align-items-center gap-2">

            {% if current_user %}
                <a href="/" class="btn btn-sm btn-outline-light">홈</a>
                <a href="/history" class="btn btn-sm btn-outline-light">히스토리</a>

                {% if current_user.is_superadmin %}
                    <a href="/admin" class="btn btn-sm btn-warning">관리자</a>
                    <a href="/branches" class="btn btn-sm btn-info">사업소관리</a>
                {% endif %}

                <span class="text-white ms-3">
                    {{ current_user.username }} ({{ current_user.branch.name }})
                </span>

                <a href="/logout" class="btn btn-sm btn-danger ms-2">로그아웃</a>
            {% endif %}

        </div>
    </div>
</nav>


<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
