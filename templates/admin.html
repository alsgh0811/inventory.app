{% extends "base.html" %}
{% block content %}

<h3>사용자 관리</h3>

<form method="GET" class="mb-3">

    <select name="branch_id" class="form-select" style="width:200px; display:inline;">
        <option value="">전체 사업소</option>

        {% for branch in branches %}
            <option value="{{ branch.id }}"
                {% if selected_branch == branch.id|string %} selected {% endif %}>
                {{ branch.name }}
            </option>
        {% endfor %}
    </select>

    <button type="submit" class="btn btn-primary btn-sm">필터</button>
</form>

<table class="table table-bordered">
    <tr>
        <th>ID</th>
        <th>아이디</th>
        <th>사업소</th>
        <th>승인여부</th>
        <th>역할</th>
        <th>수정</th>
        <th>삭제</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.branch.name }}</td>
        <td>{{ "승인" if user.is_active else "대기" }}</td>
        <td>
            {% if user.is_superadmin %}
                슈퍼관리자
            {% else %}
                일반사용자
            {% endif %}
        </td>

        <td>
            <a href="/edit_user/{{ user.id }}" class="btn btn-sm btn-warning">수정</a>
        </td>

        <td>
            <a href="/delete_user/{{ user.id }}" 
               class="btn btn-sm btn-danger"
               onclick="return confirm('정말 삭제하시겠습니까?');">
               삭제
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
